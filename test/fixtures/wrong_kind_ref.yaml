openapi: "3.0.0"
info:
  title: Wrong Kind Ref Test
  version: 1.0.0
paths:
  /test:
    get:
      operationId: getTest
      parameters:
        # This ref points to schemas, but resolve looks in parameters by name only.
        # If components.parameters also has "Pet", it would shadow silently.
        - $ref: "#/components/schemas/Pet"
      responses:
        "200":
          description: OK
components:
  schemas:
    Pet:
      type: object
      properties:
        name:
          type: string
  parameters:
    Pet:
      name: pet_id
      in: query
      schema:
        type: string
