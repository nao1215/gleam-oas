openapi: "3.0.3"
info:
  title: Enum Variants API
  version: "1.0.0"
  description: API with multiple enum types including string and integer enums
servers:
  - url: https://api.example.com/v1
paths:
  /tasks:
    get:
      operationId: listTasks
      summary: List all tasks
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/Status"
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      summary: Create a new task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreate"
      responses:
        "201":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
  /tasks/{id}:
    get:
      operationId: getTask
      summary: Get a task by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    put:
      operationId: updateTask
      summary: Update a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskCreate"
      responses:
        "200":
          description: Task updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      summary: Delete a task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Task deleted
components:
  schemas:
    Status:
      type: string
      enum:
        - pending
        - active
        - suspended
        - deleted
    Priority:
      type: integer
      enum:
        - 1
        - 2
        - 3
        - 4
        - 5
    ContentType:
      type: string
      enum:
        - application/json
        - text/plain
        - text/html
    Task:
      type: object
      required:
        - id
        - title
        - status
        - priority
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/Status"
        priority:
          $ref: "#/components/schemas/Priority"
        output_format:
          $ref: "#/components/schemas/ContentType"
        created_at:
          type: string
          format: date-time
    TaskCreate:
      type: object
      required:
        - title
        - status
        - priority
      properties:
        title:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/Status"
        priority:
          $ref: "#/components/schemas/Priority"
        output_format:
          $ref: "#/components/schemas/ContentType"
