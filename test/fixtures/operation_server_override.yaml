openapi: "3.0.3"
info:
  title: Operation Server Override API
  version: "1.0.0"
servers:
  - url: https://read.example.com/v1
    description: Default read server
paths:
  /items:
    get:
      operationId: listItems
      responses:
        "200":
          description: List of items
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    name:
                      type: string
    post:
      operationId: createItem
      servers:
        - url: https://write.example.com/v1
          description: Write server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
              required:
                - name
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
