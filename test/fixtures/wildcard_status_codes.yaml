openapi: "3.0.3"
info:
  title: Wildcard Status Codes API
  version: "1.0.0"
paths:
  /resources/{id}:
    get:
      operationId: getResource
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
        "4XX":
          description: Client error
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
        "5XX":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  traceId:
                    type: string
                  detail:
                    type: string
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
