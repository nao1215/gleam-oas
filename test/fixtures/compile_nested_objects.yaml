openapi: "3.0.3"
info:
  title: Nested Objects API
  version: "1.0.0"
  description: API with deeply nested inline object definitions
servers:
  - url: https://api.example.com/v1
paths:
  /companies/{id}:
    get:
      operationId: getCompany
      summary: Retrieve a company by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Company found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "404":
          description: Company not found
  /companies:
    post:
      operationId: createCompany
      summary: Create a new company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Company"
      responses:
        "201":
          description: Company created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
components:
  schemas:
    Company:
      type: object
      required:
        - name
        - departments
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        founded_year:
          type: integer
        departments:
          type: array
          items:
            type: object
            required:
              - name
              - teams
            properties:
              name:
                type: string
              budget:
                type: number
                format: double
              teams:
                type: array
                items:
                  type: object
                  required:
                    - name
                    - members
                  properties:
                    name:
                      type: string
                    lead:
                      type: string
                    members:
                      type: array
                      items:
                        type: object
                        required:
                          - full_name
                          - role
                          - address
                        properties:
                          full_name:
                            type: string
                          role:
                            type: string
                          hire_date:
                            type: string
                            format: date
                          address:
                            type: object
                            required:
                              - city
                              - country
                            properties:
                              city:
                                type: string
                              country:
                                type: string
                              postal_code:
                                type: string
